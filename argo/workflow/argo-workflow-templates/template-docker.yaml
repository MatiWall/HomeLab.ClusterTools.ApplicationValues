apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: docker-templates
spec:
  serviceAccountName: argo-workflow-svc

  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi

  templates:
  - name: build-tag-push
    inputs:
      parameters:
        - name: subpath
        - name: registry
        - name: application-name
        - name: version

    volumes:
      - name: ca-bundle
        configMap:
          name: homelab-root-ca-bundle
      - name: buildkit-config
        configMap:
          name: buildkitd-toml-config

    # CLIENT CONTAINER
    container:
      image: moby/buildkit:master-rootless
      command: [sh, -c]
      args:
        - |
          set -e

          IMAGE="{{inputs.parameters.registry}}{{inputs.parameters.application-name}}:{{inputs.parameters.version}}"

          until buildctl --addr unix:///run/buildkit/buildkitd.sock debug workers > /dev/null 2>&1; do
            echo "Waiting for buildkitd sidecar..."
            sleep 1
          done

          # Note: The client uses its own mount path to load the secret context data
          buildctl --addr unix:///run/buildkit/buildkitd.sock build \
            --frontend dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --output type=image,name=${IMAGE},push=true \
            --secret id=homelab_ca,src=/home/user/certs/homelab-root-ca-bundle.pem

      workingDir: /src/{{inputs.parameters.subpath}}
      volumeMounts:
        - name: workdir
          mountPath: /src
        - name: ca-bundle
          mountPath: /home/user/certs/homelab-root-ca-bundle.pem
          subPath: root-certs.pem
          readOnly: true
        - name: workdir
          mountPath: /run/buildkit
          subPath: buildkit-socket

    # DAEMON SIDECAR
    sidecars:
      - name: buildkitd
        image: moby/buildkit:master-rootless
        args: ["--config", "/etc/buildkit/buildkitd.toml", "--addr", "unix:///run/buildkit/buildkitd.sock"]
        securityContext:
          privileged: true
        volumeMounts:
          - name: buildkit-config
            mountPath: /etc/buildkit/buildkitd.toml
            subPath: buildkitd.toml
          - name: ca-bundle
            # CHANGE: Mount to /etc/ system scope inside the sidecar for the root process to parse
            mountPath: /etc/buildkit/certs/homelab-root-ca-bundle.pem
            subPath: root-certs.pem
            readOnly: true
          - name: workdir
            mountPath: /run/buildkit
            subPath: buildkit-socket
