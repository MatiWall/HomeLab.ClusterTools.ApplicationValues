

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: mwstack-pipeline
spec:
  podGC:
    strategy: OnWorkflowSuccess
    deleteDelayDuration: 1m
  entrypoint: build-and-deploy
  serviceAccountName: argo-workflow-svc
  volumeClaimTemplates:                 # define volume, same syntax as k8s Pod spec
    - metadata:
        name: workdir                     # name of volume claim
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi

  arguments:
    parameters:
      - name: giturl
        value: git@github.com:MatiWall/ 
      - name: repo
        value: FitTracker
      - name: registry
        value: docker-registry.mw.local/ #docker-registry-service.docker-registry.svc.cluster.local:5000
  templates:
    - name: build-and-deploy
      dag:
        tasks:
          - name: git-clone
            templateRef:
              name: git-template
              template: git-clone
            arguments:
              parameters:
                - name: url
                  value: "{{workflow.parameters.giturl}}{{workflow.parameters.repo}}"

          - name: parse-pipeline
            dependencies: [git-clone]
            template: parse-pipeline

          - name: generate-tag
            dependencies: [git-clone]
            template: generate-tag
            arguments:
              parameters:
                - name: git-hash
                  value: "{{tasks.git-clone.outputs.parameters.git-hash}}"

          - name: build-push
            dependencies:
              - generate-tag
              - parse-pipeline
            templateRef:
              name: docker-templates
              template: build-tag-push
            arguments:
              parameters:
                - name: application-name
                  value: "{{item.name}}"
                - name: subpath
                  value: "{{item.path}}"
                - name: registry
                  value: "{{workflow.parameters.registry}}"
                - name: version
                  value: "{{tasks.generate-tag.outputs.parameters.version}}"
            withParam: "{{tasks.parse-pipeline.outputs.result}}"

    - name: generate-tag
      inputs:
        parameters:
          - name: git-hash

      outputs:
        parameters:
          - name: version
            valueFrom:
              path: /tmp/version.txt

      container:
        image: alpine:3.21
        command: [sh, -c]
        workingDir: /src
        volumeMounts:
          - name: workdir
            mountPath: /src
        args:
          - |
            set -e

            VERSION="$(date -u +'%Y%m%d-%H%M%S')-{{inputs.parameters.git-hash}}"
            echo "${VERSION}" > /tmp/version.txt

    - name: parse-pipeline
      script:
        image: python:3.12
        command: [python]

        volumeMounts:
          - name: workdir
            mountPath: /src

        source: |
          import json
          import pathlib
          import subprocess
          import sys

          subprocess.check_call([
              sys.executable,
              "-m",
              "pip",
              "-q",
              "install",
              "pyyaml",
          ])

          import yaml

          pipeline_file = pathlib.Path("/src/mwstack-pipeline.yaml")

          if not pipeline_file.exists():
              raise FileNotFoundError(
                  f"{pipeline_file} does not exist."
              )

          with pipeline_file.open() as f:
              pipeline = yaml.safe_load(f)

          builds = pipeline.get("builds", [])

          json.dump(builds, sys.stdout)