deployment:
  controller:
    # --- OpenTelemetry export from workflow-controller ---
    extraEnv:
      - name: OTEL_SERVICE_NAME
        value: argo-workflow-controller

      - name: OTEL_TRACES_EXPORTER
        value: otlp

      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: grpc

      # IMPORTANT: no http:// prefix for grpc
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: otelcollector-service.monitoring.svc.cluster.local:4317

  server:
    extraArgs:
      - --auth-mode=server

    ingress:
      enabled: true
      annotations:
        traefik.ingress.kubernetes.io/frontend-entry-points: "https"
      hosts:
        - argo-workflow.mw.local
      tls:
        - secretName: argocd-workflow-tls-secret


  # Optional but recommended: ensure workflow pods also get OTEL context propagation
  workflow:
    extraEnv:
      - name: OTEL_SERVICE_NAME
        value: argo-workflow-step

      - name: OTEL_TRACES_EXPORTER
        value: otlp

      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: grpc

      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: otelcollector-service.monitoring.svc.cluster.local:4317